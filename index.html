<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global VR Recommender</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
    <a-sky color="#0db2ff"></a-sky>
    <a-plane id="ocean" width="1000" height="1000" rotation="-90 0 0" position="0 -0.5 0" color="#00BFFF" material="opacity: 0.9; metalness: 0.5"></a-plane>

    <!-- STATIC ISLANDS (SAFE FROM CDN FAILURES) -->
    <a-entity position="-15 -0.4 -20" rotation="0 45 0">
      <a-cone color="#f1c40f" radius-bottom="20" height="4"></a-cone>
      <a-cylinder color="#8d6e63" radius="0.4" height="6" position="0 3 0"></a-cylinder>
      <a-sphere color="#2ecc71" radius="2" position="0 6 0"></a-sphere>
    </a-entity>

    <!-- VIEWING DECK -->
    <a-box id="deck" width="20" height="0.4" depth="20" position="0 -0.2 6" color="#000" material="metalness: 0.8; roughness: 0.2"></a-box>

    <a-entity id="rig" position="0 1.6 15">
      <a-camera id="camera" wasd-controls look-controls>
        <a-cursor color="#FFF" opacity="1" scale="0.6 0.6 0.6"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- MAIN DASHBOARD -->
    <a-entity id="selection-hub" position="0 2.8 5">
      <a-plane width="8" height="1.2" color="#000" material="opacity: 0.8" position="0 1.5 0">
        <a-text value="ELITE RECOMMENDATION HUB" align="center" color="#FFF" width="8"></a-text>
      </a-plane>

      <a-entity id="categories-grid">
        <!-- Movies (WIDE BUTTONS FOR VISIBILITY) -->
        <a-entity position="-2 0.4 0">
          <a-box class="clickable" color="#c0392b" width="1.8" height="0.6" depth="0.1"></a-box>
          <a-text value="Movies" align="center" position="0 0 0.08" width="5" color="#FFF"></a-text>
        </a-entity>
        <a-entity position="0 0.4 0">
          <a-box class="clickable" color="#2980b9" width="1.8" height="0.6" depth="0.1"></a-box>
          <a-text value="Games" align="center" position="0 0 0.08" width="5" color="#FFF"></a-text>
        </a-entity>
        <a-entity position="2 0.4 0">
          <a-box class="clickable" color="#f1c40f" width="1.8" height="0.6" depth="0.1"></a-box>
          <a-text value="Courses" align="center" position="0 0 0.08" width="5" color="#FFF"></a-text>
        </a-entity>
        <a-entity position="-1.5 -0.4 0">
          <a-box class="clickable" color="#27ae60" width="1.8" height="0.6" depth="0.1"></a-box>
          <a-text value="Travel" align="center" position="0 0 0.08" width="5" color="#FFF"></a-text>
        </a-entity>
        <a-entity position="0 -0.4 0">
          <a-box class="clickable" color="#8e44ad" width="1.8" height="0.6" depth="0.1"></a-box>
          <a-text value="Products" align="center" position="0 0 0.08" width="5" color="#FFF"></a-text>
        </a-entity>
        <a-entity position="1.5 -0.4 0">
          <a-box class="clickable" color="#d35400" width="1.8" height="0.6" depth="0.1"></a-box>
          <a-text value="Music" align="center" position="0 0 0.08" width="5" color="#FFF"></a-text>
        </a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="reco-container" position="0 2 0"></a-entity>
    <a-entity light="type: ambient; color: #FFF; intensity: 0.9"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 1.2" position="-1 10 5"></a-entity>
  </a-scene>
</body>
</html>
