<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Piece VR Explorer - 7 Wonders</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <script type="module" crossorigin src="/assets/index-DRnpUG2D.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DQmKfz0n.css">
</head>
<body>
  <div id="loading-screen">
    <div class="anchor-logo">⚓</div>
    <h1>SELECTING YOUR TREASURE...</h1>
  </div>

  <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
    <a-sky color="#24b1ff"></a-sky>
    <a-plane id="ocean" width="1000" height="1000" rotation="-90 0 0" position="0 -0.5 0" color="#0077be" material="shader: flat"></a-plane>
    <a-box id="deck" width="12" height="0.4" depth="12" position="0 -0.2 4" color="#5d4037" material="roughness: 1"></a-box>

    <a-entity id="rig" position="0 1.6 8">
      <a-camera id="camera" wasd-controls look-controls>
        <a-cursor color="#FFF" opacity="0.6" scale="0.5 0.5 0.5"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Refined Selection Layout for 7 Categories -->
    <a-entity id="selection-hub" position="0 2.2 4">
      <a-entity id="categories-grid">
        <!-- Row 1 -->
        <a-entity position="-1.5 0.6 0">
          <a-box class="clickable" color="#e74c3c" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="Entertainment" align="center" position="0 0 0.06" scale="0.3"></a-text>
        </a-entity>
        <a-entity position="0 0.6 0">
          <a-box class="clickable" color="#9b59b6" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="Games" align="center" position="0 0 0.06" scale="0.3"></a-text>
        </a-entity>
        <a-entity position="1.5 0.6 0">
          <a-box class="clickable" color="#f1c40f" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="Learning / Courses" align="center" position="0 0 0.06" scale="0.25"></a-text>
        </a-entity>

        <!-- Row 2 -->
        <a-entity position="-1.5 0 0">
          <a-box class="clickable" color="#2ecc71" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="Products / Shopping" align="center" position="0 0 0.06" scale="0.25"></a-text>
        </a-entity>
        <a-entity position="0 0 0">
          <a-box class="clickable" color="#3498db" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="Travel / Experiences" align="center" position="0 0 0.06" scale="0.25"></a-text>
        </a-entity>
        <a-entity position="1.5 0 0">
          <a-box class="clickable" color="#e67e22" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="Music" align="center" position="0 0 0.06" scale="0.3"></a-text>
        </a-entity>

        <!-- Row 3 (Food) -->
        <a-entity position="0 -0.6 0">
          <a-box class="clickable" color="#d35400" width="1.2" height="0.4" depth="0.1"></a-box>
          <a-text value="🍔 Food" align="center" position="0 0 0.06" scale="0.3"></a-text>
        </a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="reco-container" position="0 1.8 1"></a-entity>
    <a-entity light="type: ambient; color: #FFF; intensity: 1"></a-entity>
  </a-scene>

  <script>
    document.querySelector('a-scene').addEventListener('loaded', function () {
      setTimeout(() => {
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 1000);
      }, 1000);
    });
  </script>
</body>
</html>
